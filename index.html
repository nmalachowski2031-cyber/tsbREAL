<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2D TSB - RED DIRECTIONAL DASH</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #222; color: #fff; font-family: Arial, sans-serif;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    canvas { border: 2px solid #444; background: linear-gradient(to bottom, #87CEEB 70%, #90EE90 100%); }
    #instructions {
      position: absolute; top: 10px; left: 10px; font-size: 14px; background: rgba(0,0,0,0.9);
      padding: 15px; border-radius: 8px; max-width: 320px;
    }
  </style>
</head>
<body>
  <div id="instructions">
    <strong style="color:#FF4444">🔴 RED = YOU</strong><br>
    A = Move Left | D = Move Right<br>
    Space = Jump | Q = Dash (direction of LAST move)<br>
    Z = M1 | 1 = Special Punch<br>
    <span style="color:#FFAA00">Hitboxes visible • X blocks attacks</span>
  </div>
  <canvas id="game" width="800" height="600"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // Input tracking - SEPARATE for RED only
    const playerInput = {};
    
    // RED PLAYER (YOU CONTROL)
    const player = {
      x: 400, y: 430, vx: 0, vy: 0, width: 32, height: 32,
      hp: 100, maxHp: 100, onGround: false, facing: 1,
      lastMoveDir: 1,  // ← NEW: Tracks last A/D direction
      m1Combo: 0, m1Cooldown: 0, specialWindup: 0
    };
    
    // BLUE DUMMY (NEVER controlled)
    const dummy = {
      x: 100, y: 430, vx: 0, vy: 0, width: 32, height: 32,
      hp: 100, maxHp: 100, onGround: false, facing: 1,
      ragdoll: 0
    };
    
    const block = { x: 380, y: 420, width: 40, height: 80, active: true };
    const gravity = 0.6, moveSpeed = 5, jumpPower = -14, dashPower = 16;
    let cameraX = 0, gameTime = 0, hitboxes = [];
    
    // Input - RED PLAYER ONLY
    window.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      playerInput[key] = true;
    });
    window.addEventListener('keyup', e => {
      const key = e.key.toLowerCase();
      playerInput[key] = false;
    });
    
    function drawCharacter(x, y, isPlayer, ragdoll = 0) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(isPlayer ? player.facing : 1, 1);
      
      const bodyColor = isPlayer ? '#DC143C' : '#4169E1';
      ctx.fillStyle = bodyColor;
      ctx.fillRect(-16, -16, 32, 32);
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
      ctx.strokeRect(-16, -16, 32, 32);
      
      ctx.fillStyle = '#000';
      ctx.fillRect(-10, -8, 5, 5);
      ctx.fillRect(3, -8, 5, 5);
      ctx.fillRect(-5, 3, 10, 3);
      
      const handBob = Math.sin(gameTime * 0.02) * 2;
      ctx.fillStyle = isPlayer ? '#FF4500' : '#6495ED';
      ctx.fillRect(-24, -4 + handBob, 10, 10);
      ctx.fillRect(14, -4 + handBob, 10, 10);
      
      ctx.restore();
    }
    
    function drawHPBar(entity, x, y) {
      const width = 36, height = 6;
      x -= 18; y -= 30;
      ctx.fillStyle = '#222';
      ctx.fillRect(x, y, width, height);
      ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
      ctx.strokeRect(x, y, width, height);
      
      const hpPercent = entity.hp / entity.maxHp;
      ctx.fillStyle = hpPercent > 0.5 ? '#4CAF50' : hpPercent > 0.25 ? '#FF9800' : '#F44336';
      ctx.fillRect(x + 1, y + 1, width * hpPercent - 2, height - 2);
    }
    
    function rectsCollide(a, b) {
      return a.x < b.x + b.width && a.x + a.width > b.x &&
             a.y < b.y + b.height && a.y + a.height > b.y;
    }
    
    function drawHitboxes() {
      hitboxes.forEach(hb => {
        ctx.strokeStyle = hb.blocked ? '#FF0000' : '#FFAA00';
        ctx.lineWidth = 3;
        ctx.strokeRect(hb.x - cameraX, hb.y, hb.width, hb.height);
        ctx.fillStyle = 'rgba(255,255,0,0.3)';
        ctx.fillRect(hb.x - cameraX, hb.y, hb.width, hb.height);
      });
      hitboxes = hitboxes.filter(hb => hb.life-- > 0);
    }
    
    function respawnDummy() {
      dummy.x = 100; dummy.y = 430; dummy.vx = 0; dummy.vy = 0;
      dummy.hp = 100; dummy.ragdoll = 0; block.active = true;
    }
    
    function updateEntity(entity, isPlayer = false) {
      if (entity.ragdoll > 0) {
        entity.ragdoll--;
        entity.vy += gravity * 1.8;
        entity.vx *= 0.96;
        entity.y += entity.vy;
        entity.x += entity.vx;
        if (entity.y > 500 - entity.height) {
          entity.y = 500 - entity.height;
          entity.vy *= -0.4;
          entity.ragdoll--;
        }
        return;
      }
      
      entity.vy += gravity;
      entity.y += entity.vy;
      entity.x += entity.vx;
      entity.vx *= 0.85;
      
      if (entity.y > 500 - entity.height) {
        entity.y = 500 - entity.height;
        entity.vy = 0;
        entity.onGround = true;
      } else entity.onGround = false;
    }
    
    // MAIN UPDATE - RED ONLY
    function update() {
      gameTime++;
      
      // A = LEFT, D = RIGHT - Updates lastMoveDir
      if (playerInput['a']) {
        player.vx = -moveSpeed;
        player.facing = -1;
        player.lastMoveDir = -1;  // ← TRACKS LAST DIRECTION
      } else if (playerInput['d']) {
        player.vx = moveSpeed;
        player.facing = 1;
        player.lastMoveDir = 1;   // ← TRACKS LAST DIRECTION
      } else {
        player.vx *= 0.8;
      }
      
      // Jump
      if (playerInput[' '] && player.onGround) {
        player.vy = jumpPower;
        player.onGround = false;
      }
      
      // DASH uses LAST MOVE DIRECTION (A then Q = left dash!)
      if (playerInput['q']) {
        player.vx = player.lastMoveDir * dashPower;  // ← KEY FIX
        player.vy -= 6;
        playerInput['q'] = false;  // One dash per press
      }
      
      // M1
      if (playerInput['z'] && player.m1Cooldown <= 0) {
        player.m1Cooldown = 51;
        const hitbox = {
          x: player.x + (player.facing * 25), y: player.y - 12,
          width: 55, height: 44, life: 15
        };
        
        if (rectsCollide(hitbox, block) && block.active) {
          hitbox.blocked = true;
          block.active = false;
          setTimeout(() => block.active = true, 300);
        } else if (rectsCollide(hitbox, dummy) && dummy.ragdoll === 0) {
          dummy.hp -= 3;
          dummy.vx += player.facing * 10;
          player.m1Combo = (player.m1Combo + 1) % 4;
          
          if (player.m1Combo === 0) {
            dummy.ragdoll = 90;
            dummy.vx += player.facing * 15;
          } else if (player.m1Combo === 2 && player.vy < -3) {
            dummy.ragdoll = 120;
            dummy.vy = -18;
          }
        }
        hitboxes.push(hitbox);
      }
      player.m1Cooldown = Math.max(0, player.m1Cooldown - 1);
      
      // Special 1
      if (playerInput['1'] && player.specialWindup === 0) {
        player.specialWindup = 24;
      }
      if (player.specialWindup > 0) {
        player.specialWindup--;
        if (player.specialWindup === 0) {
          const punchBox = {
            x: player.x + (player.facing * 35), y: player.y - 8,
            width: 70, height: 36, life: 20
          };
          if (rectsCollide(punchBox, dummy) && dummy.ragdoll === 0) {
            dummy.hp -= 24.5;
            dummy.ragdoll = 120;
            dummy.vx = player.facing * 25;
            dummy.vy = -12;
          }
          hitboxes.push(punchBox);
        }
      }
      
      updateEntity(player, true);
      updateEntity(dummy, false);
      
      player.x = Math.max(20, Math.min(750, player.x));
      dummy.x = Math.max(20, Math.min(350, dummy.x));
      
      if (dummy.hp <= 0) respawnDummy();
      cameraX = player.x - canvas.width / 2;
    }
    
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(-100, 500, 1000, 100);
      
      // X Block
      ctx.save();
      ctx.translate(block.x - cameraX + 20, block.y + 40);
      ctx.fillStyle = block.active ? '#FF4444' : '#666';
      ctx.fillRect(-20, -40, 40, 80);
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 28px Arial';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('X', 0, 0);
      ctx.restore();
      
      drawCharacter(player.x - cameraX, player.y, true);
      drawHPBar(player, player.x - cameraX, player.y);
      
      drawCharacter(dummy.x - cameraX, dummy.y, false);
      drawHPBar(dummy, dummy.x - cameraX, dummy.y);
      
      drawHitboxes();
      
      if (player.m1Cooldown > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillRect(canvas.width/2 - 40, 40, 80, 30);
        ctx.fillStyle = '#000';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(`M1 ${player.m1Combo + 1}/4`, canvas.width/2, 55);
      }
    }
    
    function gameLoop() {
      update();
      render();
      requestAnimationFrame(gameLoop);
    }
    gameLoop();
  </script>
</body>
</html>
